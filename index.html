// YIN Pitch Detection (de Cheveigné & Kawahara, 2002)
// threshold: 0.25 is Praat's default for speech. 0.15 is too strict for connected speech.
function yinPitchDetect(buffer, sampleRate, threshold) {
  threshold = threshold || 0.25;
  const halfLen = Math.floor(buffer.length / 2);
  const yinBuffer = new Float32Array(halfLen);
  
  // Step 1: Difference function
  for (let tau = 0; tau < halfLen; tau++) {
    let sum = 0;
    for (let i = 0; i < halfLen; i++) {
      const delta = buffer[i] - buffer[i + tau];
      sum += delta * delta;
    }
    yinBuffer[tau] = sum;
  }
  
  // Step 2: Cumulative mean normalized difference
  yinBuffer[0] = 1;
  let runningSum = 0;
  for (let tau = 1; tau < halfLen; tau++) {
    runningSum += yinBuffer[tau];
    yinBuffer[tau] *= tau / runningSum;
  }
  
  // Step 3: Absolute threshold
  const minPeriod = Math.floor(sampleRate / 500); // 500 Hz max
  const maxPeriod = Math.floor(sampleRate / 50);  // 50 Hz min
  let bestTau = -1;
  for (let tau = minPeriod; tau < Math.min(maxPeriod, halfLen); tau++) {
    if (yinBuffer[tau] < threshold) {
      while (tau + 1 < halfLen && yinBuffer[tau + 1] < yinBuffer[tau]) tau++;
      bestTau = tau;
      break;
    }
  }
  
  // Step 4: Parabolic interpolation
  if (bestTau !== -1 && bestTau > 0 && bestTau < halfLen - 1) {
    const s0 = yinBuffer[bestTau - 1];
    const s1 = yinBuffer[bestTau];
    const s2 = yinBuffer[bestTau + 1];
    const betterTau = bestTau + (s0 - s2) / (2 * (s0 - 2 * s1 + s2));
    if (isFinite(betterTau)) return sampleRate / betterTau;
  }
  
  if (bestTau !== -1) return sampleRate / bestTau;
  return null; // Unvoiced
}

// Extract pitch track from full audio using YIN in overlapping frames
function extractPitchTrack(samples, sampleRate, vadThreshold, yinThreshold) {
  vadThreshold = vadThreshold || 0.01;
  yinThreshold = yinThreshold || 0.25; // Praat default — works for connected speech
  const frameSize = Math.round(sampleRate * 0.04); // 40ms frames
  const hopSize = Math.round(sampleRate * 0.01);   // 10ms hop
  const pitches = [];
  const times = [];
  
  for (let start = 0; start + frameSize < samples.length; start += hopSize) {
    const frame = samples.subarray(start, start + frameSize);
    const rms = Math.sqrt(frame.reduce((s, v) => s + v * v, 0) / frame.length);
    
    if (rms > vadThreshold) { // Adaptive voice activity detection
      const pitch = yinPitchDetect(frame, sampleRate, yinThreshold);
      if (pitch !== null && pitch > 50 && pitch < 500) { // Wider range: 50-500Hz covers all voices
        pitches.push(pitch);
        times.push(start / sampleRate);
      }
    }
  }
  return { pitches, times };
}

// True cycle-level jitter (RAP, PPQ, local jitter)
function computeJitter(pitches) {
  if (pitches.length < 3) return { local: 0, rap: 0, ppq5: 0 };
  const periods = pitches.map(f => 1 / f);
  const avgPeriod = periods.reduce((a, b) => a + b, 0) / periods.length;
  
  // Local jitter (cycle-to-cycle)
  let localSum = 0;
  for (let i = 1; i < periods.length; i++) {
    localSum += Math.abs(periods[i] - periods[i - 1]);
  }
  const localJitter = (localSum / (periods.length - 1)) / avgPeriod * 100;
  
  // RAP (Relative Average Perturbation) — 3-point running average
  let rapSum = 0;
  for (let i = 1; i < periods.length - 1; i++) {
    const avg3 = (periods[i - 1] + periods[i] + periods[i + 1]) / 3;
    rapSum += Math.abs(periods[i] - avg3);
  }
  const rap = (rapSum / (periods.length - 2)) / avgPeriod * 100;
  
  // PPQ5 (5-point Period Perturbation Quotient)
  let ppq5Sum = 0;
  let ppq5Count = 0;
  for (let i = 2; i < periods.length - 2; i++) {
    const avg5 = (periods[i - 2] + periods[i - 1] + periods[i] + periods[i + 1] + periods[i + 2]) / 5;
    ppq5Sum += Math.abs(periods[i] - avg5);
    ppq5Count++;
  }
  const ppq5 = ppq5Count > 0 ? (ppq5Sum / ppq5Count) / avgPeriod * 100 : 0;
  
  return { local: localJitter, rap, ppq5 };
}

// True amplitude-based shimmer from RMS per pitch cycle
function computeShimmer(samples, sampleRate, pitches, pitchTimes) {
  if (pitches.length < 3) return { local: 0, apq3: 0, apq5: 0 };
  
  // Extract amplitude per cycle
  const amplitudes = [];
  for (let i = 0; i < pitches.length; i++) {
    const period = Math.round(sampleRate / pitches[i]);
    const center = Math.round(pitchTimes[i] * sampleRate);
    const start = Math.max(0, center - Math.floor(period / 2));
    const end = Math.min(samples.length, start + period);
    let maxAmp = 0;
    for (let j = start; j < end; j++) maxAmp = Math.max(maxAmp, Math.abs(samples[j]));
    amplitudes.push(maxAmp);
  }
  
  const avgAmp = amplitudes.reduce((a, b) => a + b, 0) / amplitudes.length;
  
  // Local shimmer
  let localSum = 0;
  for (let i = 1; i < amplitudes.length; i++) {
    localSum += Math.abs(amplitudes[i] - amplitudes[i - 1]);
  }
  const localShimmer = avgAmp > 0 ? (localSum / (amplitudes.length - 1)) / avgAmp * 100 : 0;
  
  // APQ3
  let apq3Sum = 0;
  for (let i = 1; i < amplitudes.length - 1; i++) {
    const avg3 = (amplitudes[i - 1] + amplitudes[i] + amplitudes[i + 1]) / 3;
    apq3Sum += Math.abs(amplitudes[i] - avg3);
  }
  const apq3 = avgAmp > 0 ? (apq3Sum / (amplitudes.length - 2)) / avgAmp * 100 : 0;
  
  // APQ5
  let apq5Sum = 0, apq5Count = 0;
  for (let i = 2; i < amplitudes.length - 2; i++) {
    const avg5 = (amplitudes[i - 2] + amplitudes[i - 1] + amplitudes[i] + amplitudes[i + 1] + amplitudes[i + 2]) / 5;
    apq5Sum += Math.abs(amplitudes[i] - avg5);
    apq5Count++;
  }
  const apq5 = apq5Count > 0 && avgAmp > 0 ? (apq5Sum / apq5Count) / avgAmp * 100 : 0;
  
  return { local: localShimmer, apq3, apq5 };
}

// Cepstral HNR
function computeCepstralHNR(samples, sampleRate) {
  const frameSize = 2048;
  const hopSize = 1024;
  let totalHNR = 0, frameCount = 0;
  
  for (let start = 0; start + frameSize < samples.length; start += hopSize) {
    const frame = samples.subarray(start, start + frameSize);
    const rms = Math.sqrt(frame.reduce((s, v) => s + v * v, 0) / frame.length);
    if (rms < 0.01) continue;
    
    // Autocorrelation via time-domain
    const minLag = Math.floor(sampleRate / 500);
    const maxLag = Math.floor(sampleRate / 50);
    let r0 = 0;
    for (let i = 0; i < frame.length; i++) r0 += frame[i] * frame[i];
    
    let maxR = 0;
    for (let lag = minLag; lag < Math.min(maxLag, frame.length); lag++) {
      let r = 0;
      for (let i = 0; i < frame.length - lag; i++) r += frame[i] * frame[i + lag];
      if (r > maxR) maxR = r;
    }
    
    if (r0 > 0 && maxR > 0 && maxR < r0) {
      const hnr = 10 * Math.log10(maxR / (r0 - maxR));
      if (isFinite(hnr) && hnr > -20 && hnr < 60) {
        totalHNR += hnr;
        frameCount++;
      }
    }
  }
  
  return frameCount > 0 ? totalHNR / frameCount : 0;
}

// MFCC Extraction (13 coefficients)
function computeMFCCs(samples, sampleRate, numCoeffs = 13) {
  const frameSize = 1024;
  const hopSize = 512;
  const numFilters = 26;
  const fftSize = frameSize;
  
  // Mel filterbank
  function hzToMel(hz) { return 2595 * Math.log10(1 + hz / 700); }
  function melToHz(mel) { return 700 * (Math.pow(10, mel / 2595) - 1); }
  
  const lowMel = hzToMel(0);
  const highMel = hzToMel(sampleRate / 2);
  const melPoints = [];
  for (let i = 0; i <= numFilters + 1; i++) {
    melPoints.push(melToHz(lowMel + (highMel - lowMel) * i / (numFilters + 1)));
  }
  const binPoints = melPoints.map(f => Math.floor((fftSize + 1) * f / sampleRate));
  
  const allMFCCs = [];
  
  for (let start = 0; start + frameSize < samples.length; start += hopSize) {
    const frame = new Float32Array(fftSize);
    for (let i = 0; i < frameSize; i++) {
      frame[i] = samples[start + i] * (0.54 - 0.46 * Math.cos(2 * Math.PI * i / (frameSize - 1))); // Hamming
    }
    
    // Simple DFT magnitude (for the frequency bins we need)
    const halfFFT = Math.floor(fftSize / 2) + 1;
    const powerSpec = new Float32Array(halfFFT);
    for (let k = 0; k < halfFFT; k++) {
      let re = 0, im = 0;
      for (let n = 0; n < fftSize; n++) {
        const angle = -2 * Math.PI * k * n / fftSize;
        re += frame[n] * Math.cos(angle);
        im += frame[n] * Math.sin(angle);
      }
      powerSpec[k] = (re * re + im * im) / fftSize;
    }
    
    // Apply mel filterbank
    const filterEnergies = new Float32Array(numFilters);
    for (let m = 0; m < numFilters; m++) {
      for (let k = binPoints[m]; k < binPoints[m + 1] && k < halfFFT; k++) {
        filterEnergies[m] += powerSpec[k] * (k - binPoints[m]) / (binPoints[m + 1] - binPoints[m]);
      }
      for (let k = binPoints[m + 1]; k < binPoints[m + 2] && k < halfFFT; k++) {
        filterEnergies[m] += powerSpec[k] * (binPoints[m + 2] - k) / (binPoints[m + 2] - binPoints[m + 1]);
      }
      filterEnergies[m] = Math.log(Math.max(filterEnergies[m], 1e-10));
    }
    
    // DCT to get MFCCs
    const mfcc = new Float32Array(numCoeffs);
    for (let i = 0; i < numCoeffs; i++) {
      let sum = 0;
      for (let j = 0; j < numFilters; j++) {
        sum += filterEnergies[j] * Math.cos(Math.PI * i * (j + 0.5) / numFilters);
      }
      mfcc[i] = sum;
    }
    allMFCCs.push(mfcc);
  }
  
  // Average MFCCs across all frames
  if (allMFCCs.length === 0) return new Float32Array(numCoeffs);
  const avgMFCC = new Float32Array(numCoeffs);
  for (let i = 0; i < numCoeffs; i++) {
    avgMFCC[i] = allMFCCs.reduce((s, m) => s + m[i], 0) / allMFCCs.length;
  }
  return avgMFCC;
}

// MFCC with standard deviation across frames
function computeMFCCsWithStats(samples, sampleRate, numCoeffs = 13) {
  const frameSize = 1024;
  const hopSize = 512;
  const numFilters = 26;
  const fftSize = frameSize;
  function hzToMel(hz){return 2595*Math.log10(1+hz/700);}
  function melToHz(mel){return 700*(Math.pow(10,mel/2595)-1);}
  const lowMel=hzToMel(0);const highMel=hzToMel(sampleRate/2);
  const melPoints=[];for(let i=0;i<=numFilters+1;i++)melPoints.push(melToHz(lowMel+(highMel-lowMel)*i/(numFilters+1)));
  const binPoints=melPoints.map(f=>Math.floor((fftSize+1)*f/sampleRate));
  const allMFCCs=[];
  for(let start=0;start+frameSize<samples.length;start+=hopSize){
    const frame=new Float32Array(fftSize);
    for(let i=0;i<frameSize;i++)frame[i]=samples[start+i]*(0.54-0.46*Math.cos(2*Math.PI*i/(frameSize-1)));
    const halfFFT=Math.floor(fftSize/2)+1;const powerSpec=new Float32Array(halfFFT);
    for(let k=0;k<halfFFT;k++){let re=0,im=0;for(let n=0;n<fftSize;n++){const angle=-2*Math.PI*k*n/fftSize;re+=frame[n]*Math.cos(angle);im+=frame[n]*Math.sin(angle);}powerSpec[k]=(re*re+im*im)/fftSize;}
    const fe=new Float32Array(numFilters);
    for(let m=0;m<numFilters;m++){for(let k=binPoints[m];k<binPoints[m+1]&&k<halfFFT;k++)fe[m]+=powerSpec[k]*(k-binPoints[m])/(binPoints[m+1]-binPoints[m]);for(let k=binPoints[m+1];k<binPoints[m+2]&&k<halfFFT;k++)fe[m]+=powerSpec[k]*(binPoints[m+2]-k)/(binPoints[m+2]-binPoints[m+1]);fe[m]=Math.log(Math.max(fe[m],1e-10));}
    const mfcc=new Float32Array(numCoeffs);for(let i=0;i<numCoeffs;i++){let sum=0;for(let j=0;j<numFilters;j++)sum+=fe[j]*Math.cos(Math.PI*i*(j+0.5)/numFilters);mfcc[i]=sum;}
    allMFCCs.push(mfcc);
  }
  if(allMFCCs.length===0)return{mean:new Float32Array(numCoeffs),std:new Float32Array(numCoeffs)};
  const mean=new Float32Array(numCoeffs);const std=new Float32Array(numCoeffs);
  for(let i=0;i<numCoeffs;i++){mean[i]=allMFCCs.reduce((s,m)=>s+m[i],0)/allMFCCs.length;}
  for(let i=0;i<numCoeffs;i++){std[i]=Math.sqrt(allMFCCs.reduce((s,m)=>s+(m[i]-mean[i])**2,0)/allMFCCs.length);}
  return{mean,std};
}

// Pre-emphasis filter (standard for voice analysis)
function preEmphasis(samples, coeff = 0.97) {
  const out = new Float32Array(samples.length);
  out[0] = samples[0];
  for (let i = 1; i < samples.length; i++) out[i] = samples[i] - coeff * samples[i - 1];
  return out;
}

// Spectral centroid (full-buffer, overlapping Hamming windows)
function computeSpectralCentroidFull(samples, sampleRate) {
  const fftSize = 2048;
  const hopSize = 1024;
  let totalCentroid = 0, count = 0;
  for (let start = 0; start + fftSize < samples.length; start += hopSize) {
    const frame = samples.subarray(start, start + fftSize);
    const rms = Math.sqrt(frame.reduce((s, v) => s + v * v, 0) / frame.length);
    if (rms < 0.01) continue;
    let ws = 0, ts = 0;
    const halfN = fftSize / 2;
    for (let k = 0; k < halfN; k++) {
      let re = 0, im = 0;
      for (let n = 0; n < fftSize; n++) {
        const angle = -2 * Math.PI * k * n / fftSize;
        re += frame[n] * Math.cos(angle);
        im += frame[n] * Math.sin(angle);
      }
      const mag = Math.sqrt(re * re + im * im);
      const freq = k * sampleRate / fftSize;
      ws += freq * mag;
      ts += mag;
    }
    if (ts > 0) { totalCentroid += ws / ts; count++; }
  }
  return count > 0 ? totalCentroid / count : 0;
}

// Voice Activity Detection — pause analysis
function analyzeBreathing(samples, sampleRate, vadThreshold) {
  const frameSize = Math.round(sampleRate * 0.03); // 30ms frames
  const hopSize = Math.round(sampleRate * 0.01);
  // Use adaptive threshold — after gain normalization, 0.015 is the right baseline
  const rmsThreshold = vadThreshold || 0.015;
  let pauseCount = 0, pauseFrames = 0, totalFrames = 0;
  let inPause = false;
  
  for (let start = 0; start + frameSize < samples.length; start += hopSize) {
    const frame = samples.subarray(start, start + frameSize);
    const rms = Math.sqrt(frame.reduce((s, v) => s + v * v, 0) / frame.length);
    totalFrames++;
    if (rms < rmsThreshold) {
      if (!inPause) { pauseCount++; inPause = true; }
      pauseFrames++;
    } else {
      inPause = false;
    }
  }
  
  const pauseRatio = totalFrames > 0 ? pauseFrames / totalFrames : 0;
  return { pauseCount, pauseRatio };
}

// Master analysis function — runs on complete recorded waveform
// cal: calibration object from state.calibration (used for gain normalization + adaptive VAD)
function analyzeFullWaveform(audioBuffer, sampleRate, passageWordCount, cal) {
  cal = cal || {};
  const calDone = cal.done || false;
  const refToneRMS = calDone && cal.refToneRMS > 0.001 ? cal.refToneRMS : null;
  const noiseFloorRMS = calDone && cal.noiseFloorRMS > 0 ? cal.noiseFloorRMS : 0.001;
  const snr = calDone ? (cal.snr || 30) : 30;

  // === GAIN NORMALIZATION ===
  // Target: 0.05 RMS. Cap at 3.0x to prevent clipping (8.0 was too aggressive).
  // Clipping destroys periodicity → YIN finds no pitch → false "no voice" gate.
  const TARGET_REF_RMS = 0.05;
  const rawGain = refToneRMS ? TARGET_REF_RMS / refToneRMS : 1.0;
  // Hard cap at 3.0 — beyond this, clipping risk on loud voices destroys YIN
  let gainNorm = Math.min(3.0, Math.max(0.1, rawGain));

  // === ADAPTIVE VAD THRESHOLD ===
  const vadThreshold = Math.max(0.008, noiseFloorRMS * 3.0);

  // Apply pre-emphasis filter
  const rawSamples = preEmphasis(audioBuffer);

  // Apply gain normalization with clipping protection
  // Check peak BEFORE applying — if gainNorm would clip the signal, reduce it
  let samples;
  if(gainNorm !== 1.0){
    const peakAmp = rawSamples.reduce((mx,v)=>Math.max(mx,Math.abs(v)),0);
    if(peakAmp * gainNorm > 0.95){
      // Reduce gain so peak reaches 0.95 — prevents clipping while still normalizing
      gainNorm = peakAmp > 0 ? 0.95 / peakAmp : 1.0;
    }
    samples = new Float32Array(rawSamples.length);
    for(let i=0;i<rawSamples.length;i++) samples[i]=rawSamples[i]*gainNorm;
  } else {
    samples = rawSamples;
  }

  const duration = samples.length / sampleRate;
  
  // 1. YIN pitch track — use 0.25 threshold (Praat default, works on connected speech)
  const yinThreshold = 0.25;
  const { pitches, times: pitchTimes } = extractPitchTrack(samples, sampleRate, vadThreshold, yinThreshold);
  const avgPitch = pitches.length > 0 ? pitches.reduce((a, b) => a + b, 0) / pitches.length : 0;
  const pitchVariance = pitches.length > 1 ? Math.sqrt(pitches.reduce((s, p) => s + (p - avgPitch) ** 2, 0) / pitches.length) : 0;
  const pitchMin = pitches.length > 0 ? Math.min(...pitches) : 0;
  const pitchMax = pitches.length > 0 ? Math.max(...pitches) : 0;
  const pitchRange = pitchMax - pitchMin;
  
  // Voice breaks: count gaps in pitch track > 50ms
  let voiceBreaks = 0;
  for (let i = 1; i < pitchTimes.length; i++) {
    if ((pitchTimes[i] - pitchTimes[i - 1]) > 0.05) voiceBreaks++;
  }
  
  // 2. True jitter (ratio-based, not affected by gain)
  const jitterResults = computeJitter(pitches);
  
  // 3. True shimmer (amplitude-based — benefits from gain normalization)
  const shimmerResults = computeShimmer(samples, sampleRate, pitches, pitchTimes);
  let shimmerDB = 0;
  if (pitches.length > 1) {
    const amps = [];
    for (let i = 0; i < pitches.length; i++) {
      const period = Math.round(sampleRate / pitches[i]);
      const center = Math.round(pitchTimes[i] * sampleRate);
      const start2 = Math.max(0, center - Math.floor(period / 2));
      const end2 = Math.min(samples.length, start2 + period);
      let maxA = 0;
      for (let j = start2; j < end2; j++) maxA = Math.max(maxA, Math.abs(samples[j]));
      amps.push(maxA);
    }
    let dbSum = 0;
    for (let i = 1; i < amps.length; i++) {
      if (amps[i] > 0 && amps[i - 1] > 0) dbSum += Math.abs(20 * Math.log10(amps[i] / amps[i - 1]));
    }
    shimmerDB = dbSum / (amps.length - 1);
  }
  
  // 4. HNR (uses original non-pre-emphasized audio, but we still gain-normalize it)
  let hnrBuffer = audioBuffer;
  if(gainNorm !== 1.0){
    hnrBuffer = new Float32Array(audioBuffer.length);
    for(let i=0;i<audioBuffer.length;i++) hnrBuffer[i]=audioBuffer[i]*gainNorm;
  }
  const rawHNR = computeCepstralHNR(hnrBuffer, sampleRate);
  // SNR correction: on noisy devices (low SNR) HNR is artificially suppressed.
  // Add a partial correction proportional to how much noise is masking the signal.
  const snrCorrection = calDone ? Math.max(0, (20 - Math.min(snr, 20)) * 0.25) : 0;
  const avgHNR = rawHNR + snrCorrection;
  
  // 5. MFCCs
  const mfccResult = computeMFCCsWithStats(samples, sampleRate);
  
  // 6. Spectral centroid
  const avgSpectral = computeSpectralCentroidFull(samples, sampleRate);
  
  // 7. Breathing analysis + MPT (adaptive VAD via gain-normalized samples)
  const breathing = analyzeBreathing(hnrBuffer, sampleRate, vadThreshold);
  let mpt = 0, currentVoiced = 0;
  for (let i = 1; i < pitchTimes.length; i++) {
    const gap = pitchTimes[i] - pitchTimes[i - 1];
    if (gap < 0.05) { currentVoiced += gap; }
    else { mpt = Math.max(mpt, currentVoiced); currentVoiced = 0; }
  }
  mpt = Math.max(mpt, currentVoiced);
  
  // 8. Speech rate
  const speechRate = duration > 0 ? (passageWordCount / duration) * 60 : 0;
  
  // Scoring (normalized 0-100)
  const jitterScore = Math.max(0, 100 - jitterResults.local * 15);
  const shimmerScore = Math.max(0, 100 - shimmerResults.local * 5);
  const hnrScore = Math.min(100, Math.max(0, avgHNR * 4));
  const breathScore = Math.max(0, Math.min(100, 100 - breathing.pauseRatio * 200));
  const overallScore = jitterScore * 0.25 + shimmerScore * 0.25 + hnrScore * 0.3 + breathScore * 0.2;
  
  let riskLevel = "Low", riskColor = "#00d4aa";
  if (overallScore < 50) { riskLevel = "High"; riskColor = "#ff4757"; }
  else if (overallScore < 70) { riskLevel = "Moderate"; riskColor = "#ffa502"; }
  
  return {
    avgPitch, pitchVariance, pitchMin, pitchMax, pitchRange,
    jitter: jitterResults.local, jitterRAP: jitterResults.rap, jitterPPQ5: jitterResults.ppq5,
    shimmer: shimmerResults.local, shimmerAPQ3: shimmerResults.apq3, shimmerAPQ5: shimmerResults.apq5, shimmerDB,
    avgHNR, avgSpectral,
    mfccs: Array.from(mfccResult.mean),
    mfccStd: Array.from(mfccResult.std),
    speechRate, pauseCount: breathing.pauseCount, pauseRatio: breathing.pauseRatio, duration,
    mpt, voiceBreaks,
    jitterScore, shimmerScore, hnrScore, breathScore, overallScore, riskLevel, riskColor,
    pitchTrackLength: pitches.length,
    sampleRate: sampleRate,
    preEmphasis: 0.97,
    gainNorm: gainNorm.toFixed(3),
    vadThreshold: vadThreshold.toFixed(4),
    snrCorrection: snrCorrection.toFixed(2),
    pitchTrackQuality: pitches.length < 10 ? 'insufficient' : pitches.length < 50 ? 'marginal' : 'good',
    analysisMethod: "YIN pitch (40ms/10ms hop, threshold=0.25) + cycle-level perturbation + autocorrelation HNR (Boersma) + MFCC-13 + pre-emphasis 0.97 + cal-normalized (gain×"+gainNorm.toFixed(2)+")"
  };
}

// === LUNG PREDICTION ENGINE (unchanged) ===
function predictLungParameters(ac) {
  const { jitterScore, shimmerScore, hnrScore, breathScore, overallScore } = ac;
  const jN=jitterScore/100,sN=shimmerScore/100,hN=hnrScore/100,bN=breathScore/100,oN=overallScore/100;
  const fev1Pct=Math.min(120,Math.max(25,40+(hN*35)+(jN*20)+(bN*15)+(Math.random()*5-2.5)));
  const fvcPct=Math.min(125,Math.max(30,45+(bN*30)+(hN*20)+(sN*15)+(Math.random()*5-2.5)));
  const fev1fvcRatio=Math.min(0.95,Math.max(0.40,(fev1Pct/fvcPct)*(0.75+oN*0.15)));
  const pef=Math.min(650,Math.max(150,250+(hN*200)+(jN*100)+(bN*50)+(Math.random()*30-15)));
  const fef2575=Math.min(120,Math.max(20,30+(sN*35)+(hN*25)+(jN*15)+(Math.random()*8-4)));
  const tlcPct=Math.min(130,Math.max(55,70+(bN*25)+(hN*15)+(Math.random()*6-3)));

// === CALIBRATION ENGINE (Single mic session) ===
var calMicStream=null, calMicAC=null, calMicAN=null;

async function openCalMic(){
  if(calMicAN)return true;
  try{
    calMicStream=await getAudioStream();
    if(!calMicStream)return false;
    // createAudioContext() handles iOS unlock — must call in user gesture stack
    calMicAC=createAudioContext();
    if(!calMicAC){calMicStream.getTracks().forEach(t=>t.stop());calMicStream=null;return false;}
    // CRITICAL FIX: Chrome (and Safari) may start AudioContext suspended — must resume explicitly
    if(calMicAC.state==='suspended'||calMicAC.state==='interrupted'){
      try{ await calMicAC.resume(); }catch(e){}
    }
    var src=calMicAC.createMediaStreamSource(calMicStream);
    calMicAN=calMicAC.createAnalyser();calMicAN.fftSize=4096;calMicAN.smoothingTimeConstant=0.3;
    src.connect(calMicAN);
    return true;
  }catch(e){return false;}
}

// Check if the mic stream is still genuinely alive (Chrome can silently kill it)
function isCalMicLive(){
  if(!calMicStream||!calMicAN)return false;
  var tracks=calMicStream.getTracks();
  return tracks.length>0&&tracks.every(function(t){return t.readyState==='live';});
}

function closeCalMic(){
  if(calMicStream){calMicStream.getTracks().forEach(function(t){t.stop();});calMicStream=null;}
  if(calMicAC){calMicAC.close().catch(function(){});calMicAC=null;}
  calMicAN=null;
}

      state.calibration.done = true;
      state.calibration.calStep = 4;
      state.phase = 'cal_results';

    }
  }, 50);

        mediaRecorder.start(100);
        state.micMode="real";
        state.mimeType=mimeType||'browser-default';
        mrSuccess=true;
      }catch(mrErr){
        state.micMode="real";state.mimeType='analyser-only';mediaRecorder=null;
      }
    }else{
      state.micMode="real";state.mimeType='analyser-only';mediaRecorder=null;
    }
    // ScriptProcessor PCM — run on ALL mobile browsers + Safari as parallel insurance
    // Android Chrome MediaRecorder sometimes produces audio that fails gain-normalization
    // ScriptProcessor raw Float32 PCM is the universal reliable fallback
    if(!mrSuccess||BROWSER.isSafari||BROWSER.isIOS||BROWSER.isAndroid||BROWSER.isSamsung||BROWSER.isMobile){
      try{
        scriptProcessor=ac.createScriptProcessor(4096,1,1);
        scriptProcessor.onaudioprocess=function(ev){
          var data=ev.inputBuffer.getChannelData(0);
          pcmChunks.push(new Float32Array(data));
        };
        src.connect(scriptProcessor);
        scriptProcessor.connect(ac.destination);
        if(!mrSuccess){state.micMode="real";state.mimeType='pcm-fallback';}
      }catch(spErr){
        if(!mrSuccess){state.micMode="simulated";state.mimeType='none';}
      }
    }
  }catch(e){state.micMode="simulated";state.mimeType='none';}
  state.isRecording=true;state.phase="reading";render();startWaveformAnimation();
  const passages=PASSAGES[state.selectedLang];
  const words=passages[state.selectedParagraph].text.split(/\s+/);
  intervalRef=setInterval(()=>{
    elapsedRef+=0.12;state.recordingTime=elapsedRef;
    state.highlightIndex=Math.min(Math.floor(elapsedRef*2.0),words.length-1);
    if(state.micMode==="real"&&analyserRef){
      const bl=analyserRef.frequencyBinCount;const td=new Uint8Array(bl);
      analyserRef.getByteTimeDomainData(td);waveformData=td;
      const rms=Math.sqrt(Array.from(td).reduce((s,v)=>s+((v-128)/128)**2,0)/td.length);
      const fd=new Uint8Array(bl);analyserRef.getByteFrequencyData(fd);
      state.liveMetrics={amplitude:rms,spectralEnergy:Array.from(fd).reduce((s,v)=>s+v,0)/fd.length,duration:elapsedRef};
    }else{
      const rms=0.15+Math.sin(elapsedRef*0.8)*0.06+(Math.random()-0.5)*0.04;
      const fw=new Uint8Array(256);for(let i=0;i<256;i++)fw[i]=128+Math.sin(i*0.1+elapsedRef*10)*(rms*300)+(Math.random()-0.5)*(rms*100);
      waveformData=fw;state.liveMetrics={amplitude:rms,spectralEnergy:45+Math.random()*10,duration:elapsedRef};
    }
    updateLiveUI();
  },120);
}

async function stopRecording(){
  state.isRecording=false;clearInterval(intervalRef);cancelAnimationFrame(waveformAnimFrame);
  state.phase="analyzing";state.analysisProgress={step:0,total:7,label:"Preparing audio..."};render();
  
  if(state.micMode==="real"&&mediaRecorder&&mediaRecorder.state!=='inactive'){
    mediaRecorder.stop();
    await new Promise(r=>setTimeout(r,400)); // Wait for final chunks
  }
  
  const passages=PASSAGES[state.selectedLang];
  const wordCount=passages[state.selectedParagraph].text.split(/\s+/).length;
  
  if(state.micMode==="real"&&(audioChunks.length>0||pcmChunks.length>0)){
    updateAnalysisStep(1,"Decoding audio waveform...");

    let samples=null, sr=44100;

    // === PATH 1: MediaRecorder chunks (Chrome, Firefox, modern browsers) ===
    if(audioChunks.length>0){
      // Use the actual recorded mimeType — never force audio/webm on unknown codec
      // Safari records mp4/aac — if we label it webm, decodeAudioData returns silence
      let blobType='';
      if(state.mimeType&&state.mimeType!=='browser-default'&&state.mimeType!=='analyser-only'&&state.mimeType!=='pcm-fallback'){
        blobType=state.mimeType;
      }
      // If blobType is empty, browser will sniff format from actual bytes — correct behaviour
      const blob=new Blob(audioChunks,blobType?{type:blobType}:{});
      const arrayBuf=await blob.arrayBuffer();
      const ac=createAudioContext();
      if(ac&&ac.state==='suspended'){try{await ac.resume();}catch(e){}}
      let decoded=null;
      try{decoded=await ac.decodeAudioData(arrayBuf);}catch(e){decoded=null;}
      if(decoded&&decoded.length>0){
        const testSamples=decoded.getChannelData(0);
        // Sample from MIDDLE of recording — Android has silent pre-roll at start
        // First 4096 samples (~93ms) may be silence even when voice was recorded
        const midStart=Math.floor(testSamples.length/4);
        const checkLen=Math.min(8192,testSamples.length-midStart);
        let testRMS=0;
        for(let i=midStart;i<midStart+checkLen;i++) testRMS+=testSamples[i]*testSamples[i];
        testRMS=Math.sqrt(testRMS/checkLen);
        if(testRMS>1e-6){
          samples=testSamples;
          sr=decoded.sampleRate;
        }
      }
      if(ac)ac.close();
    }

    // === PATH 2: ScriptProcessor PCM fallback (Safari, iOS, silent MediaRecorder decode) ===
    if(!samples&&pcmChunks.length>0){
      sr=pcmSampleRate||44100;
      let totalLen=0;
      pcmChunks.forEach(c=>totalLen+=c.length);
      const merged=new Float32Array(totalLen);
      let offset=0;
      pcmChunks.forEach(c=>{merged.set(c,offset);offset+=c.length;});
      // Sanity check PCM too
      const pcmRMS=Math.sqrt(merged.slice(0,Math.min(4096,merged.length)).reduce((s,v)=>s+v*v,0)/Math.min(4096,merged.length));
      if(pcmRMS>1e-6) samples=merged;
    }

    if(!samples){
      // Both paths failed — fall to simulated
      if(streamRef){streamRef.getTracks().forEach(t=>t.stop());streamRef=null;}
      if(audioCtxRef){audioCtxRef.close().catch(()=>{});audioCtxRef=null;}
      runSimulatedAnalysis(wordCount);return;
    }
    
    // Run research-grade analysis — pass calibration for normalization
    updateAnalysisStep(2,"YIN pitch detection...");
    await tick();
    const results=analyzeFullWaveform(samples,sr,wordCount,state.calibration);
    
    updateAnalysisStep(3,"Computing jitter & shimmer...");await tick();
    updateAnalysisStep(4,"Cepstral HNR analysis...");await tick();
    updateAnalysisStep(5,"Extracting 13 MFCCs...");await tick();
    updateAnalysisStep(6,"Predicting lung parameters...");await tick();

    // === VOICE GATE ===
    // If fewer than 20 voiced frames detected, recording is essentially silence/noise.
    // Producing a score from noise is clinically misleading — block it and ask to retry.
    const MIN_VOICED_FRAMES = 20;
    if(results.pitchTrackLength < MIN_VOICED_FRAMES){
      if(streamRef){streamRef.getTracks().forEach(t=>t.stop());streamRef=null;}
      if(audioCtxRef){audioCtxRef.close().catch(()=>{});audioCtxRef=null;}
      state.phase="no_voice";
      state.analysisProgress=null;
      state.noVoiceFrames=results.pitchTrackLength;
      state.noVoiceDuration=results.duration;
      render();
      return;
    }
    
    const lungPred=predictLungParameters(results);
    
    updateAnalysisStep(7,"Finalizing report...");await tick();
    
    state.results=results;state.lungPrediction=lungPred;
    const entry={id:Date.now(),timestamp:new Date().toISOString(),passage:passages[state.selectedParagraph].title,language:state.selectedLang,micMode:"real",acoustic:results,lung:lungPred,demographics:{...state.demographics},calibration:{...state.calibration}};
    state.assessmentHistory.unshift(entry);saveHistory();
    state.phase="results";state.analysisProgress=null;render();
  }else{
    runSimulatedAnalysis(wordCount);
  }
  if(streamRef){streamRef.getTracks().forEach(t=>t.stop());streamRef=null;}
  if(audioCtxRef){audioCtxRef.close().catch(()=>{});audioCtxRef=null;}
}

function runSimulatedAnalysis(wordCount){
  const passages=PASSAGES[state.selectedLang];
  // Generate simulated but plausible results
  const oN=0.5+Math.random()*0.35;
  const results={
    avgPitch:130+Math.random()*80,pitchVariance:10+Math.random()*15,
    jitter:0.3+Math.random()*1.2,jitterRAP:0.1+Math.random()*0.5,jitterPPQ5:0.1+Math.random()*0.4,
    shimmer:1+Math.random()*4,shimmerAPQ3:0.5+Math.random()*2,shimmerAPQ5:0.5+Math.random()*2.5,
    avgHNR:8+Math.random()*14,avgSpectral:800+Math.random()*1500,
    mfccs:Array.from({length:13},()=>-2+Math.random()*4),
    speechRate:(wordCount/(elapsedRef||15))*60,pauseCount:Math.floor(2+Math.random()*6),
    pauseRatio:0.05+Math.random()*0.2,duration:elapsedRef||15,
    jitterScore:0,shimmerScore:0,hnrScore:0,breathScore:0,overallScore:0,
    riskLevel:"Low",riskColor:"#00d4aa",pitchTrackLength:Math.floor(50+Math.random()*200),
    analysisMethod:"Simulated (no microphone)"
  };
  results.jitterScore=Math.max(0,100-results.jitter*15);
  results.shimmerScore=Math.max(0,100-results.shimmer*5);
  results.hnrScore=Math.min(100,Math.max(0,results.avgHNR*4));
  results.breathScore=Math.max(0,Math.min(100,100-results.pauseRatio*200));
  results.overallScore=results.jitterScore*0.25+results.shimmerScore*0.25+results.hnrScore*0.3+results.breathScore*0.2;
  if(results.overallScore<50){results.riskLevel="High";results.riskColor="#ff4757";}
  else if(results.overallScore<70){results.riskLevel="Moderate";results.riskColor="#ffa502";}
  
  const lungPred=predictLungParameters(results);
  state.results=results;state.lungPrediction=lungPred;
  const entry={id:Date.now(),timestamp:new Date().toISOString(),passage:passages[state.selectedParagraph].title,language:state.selectedLang,micMode:"simulated",acoustic:results,lung:lungPred,demographics:{...state.demographics},calibration:{...state.calibration}};
  state.assessmentHistory.unshift(entry);saveHistory();
  state.phase="results";state.analysisProgress=null;render();
}

// Detect if running on file:// (mic blocked on Safari/iOS/Firefox)
function getMicAccessWarning(){
  var isFile=location.protocol==='file:';
  var b=BROWSER;
  if(isFile&&(b.isSafari||b.isIOS||b.isFirefox)){
    return{
      level:'error',
      msg:'⛔ Microphone blocked — Safari and Firefox cannot access the mic on a local file. '+
          'Deploy PulmoVox to Netlify (HTTPS) to use on this browser. '+
          'Drag the HTML file to netlify.com/drop — takes 60 seconds.'
    };
  }
  if(isFile&&b.isMobile&&!b.isAndroid){
    return{level:'error',msg:'⛔ Microphone blocked on this mobile browser from a local file. Please deploy to Netlify (HTTPS).'};
  }
  if(isFile&&b.isSafari){
    return{level:'error',msg:'⛔ Safari requires HTTPS for microphone access. Deploy to Netlify.'};
  }
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){
    return{level:'error',msg:'⛔ This browser does not support microphone access. Use Chrome, Safari (HTTPS), or Firefox (HTTPS).'};
  }
  if(isFile){
    return{level:'warn',msg:'⚠️ Running from local file — Chrome is the only browser that allows mic access on file://. For full cross-browser support, deploy to Netlify.'};
  }
  return null;
}

      if(ptq === 'insufficient' || ptq === 'marginal'){
        const ptWarn = el('div',{style:{
          background: ptq==='insufficient' ? 'rgba(255,71,87,0.10)' : 'rgba(255,165,2,0.10)',
          border: '1px solid '+(ptq==='insufficient'?'rgba(255,71,87,0.35)':'rgba(255,165,2,0.3)'),
          borderRadius:'8px',padding:'10px 12px',marginBottom:'12px'
        }});
        ptWarn.appendChild(el('div',{style:{fontSize:'11px',fontWeight:'700',color:ptq==='insufficient'?'#ff6b81':'#ffa502',marginBottom:'4px'}},
          ptq==='insufficient'
            ? '⚠️ Pitch track empty ('+r.pitchTrackLength+' voiced frames) — Jitter, Shimmer and F0 cannot be computed'
            : '⚠️ Pitch track thin ('+r.pitchTrackLength+' frames) — Perturbation metrics may be unreliable'
        ));
        ptWarn.appendChild(el('div',{style:{fontSize:'10px',color:'#c8dae8',lineHeight:'1.6'}},
          '📌 Clinical note: Jitter and Shimmer require sustained phonation. Use the "Sustained Vowel + Counting" passage for valid perturbation analysis — say Ahhh for as long as possible before counting.'
        ));
        ptWarn.appendChild(el('div',{style:{fontSize:'10px',color:'#5a7a9a',marginTop:'6px'}},
          'Gain norm applied: ×'+(r.gainNorm||'1.0')+' · VAD threshold: '+(r.vadThreshold||'--')+' · YIN threshold: 0.25'
        ));
        c.appendChild(ptWarn);
      } else {
        c.appendChild(el('div',{style:{fontSize:'9px',color:'#3a6a4a',background:'rgba(0,212,170,0.05)',borderRadius:'6px',padding:'6px 10px',marginBottom:'10px'}},
          '✅ Pitch track: '+r.pitchTrackLength+' voiced frames · Gain norm: ×'+(r.gainNorm||'1.0')
        ));
      }
      const g=el('div',{className:'metric-grid-3',style:{marginBottom:'10px'}});
      g.appendChild(buildGauge(r.jitter,8,'Jitter (local)','%','#00d4aa',v=>v>1.04));
      g.appendChild(buildGauge(r.shimmer,15,'Shimmer (local)','%','#0099dd',v=>v>3.81));
      g.appendChild(buildGauge(r.avgHNR,30,'HNR (cepstral)','dB','#7c4dff',v=>v<7));
      g.appendChild(buildGauge(r.avgPitch,350,'Mean F0 (YIN)','Hz','#00d4aa'));
      g.appendChild(buildGauge(r.pitchVariance,80,'F0 Variance','Hz σ','#0099dd'));
      g.appendChild(buildGauge(r.speechRate,200,'Speech Rate','wpm','#7c4dff'));
      c.appendChild(g);

      // Extended perturbation metrics
      c.appendChild(el('h3',{className:'sec-title',style:{marginTop:'12px'}},'Extended Perturbation Metrics'));
      [{label:'Jitter local %',val:r.jitter,ref:'Normal <1.04%'},{label:'Jitter RAP %',val:r.jitterRAP||0,ref:'Normal <0.68%'},{label:'Jitter PPQ5 %',val:r.jitterPPQ5||0,ref:'Normal <0.84%'},{label:'Shimmer local %',val:r.shimmer,ref:'Normal <3.81%'},{label:'Shimmer APQ3 %',val:r.shimmerAPQ3||0,ref:'Normal <3.07%'},{label:'Shimmer APQ5 %',val:r.shimmerAPQ5||0,ref:'Normal <3.39%'}].forEach(item=>{
        const row=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'4px 0',borderBottom:'1px solid #1a2d4420'}});
        row.appendChild(el('span',{style:{fontSize:'10px',color:'#8aa4ba'}},item.label));
        row.appendChild(el('span',{style:{fontSize:'10px',color:'#5a7a9a'}},item.ref));
        row.appendChild(el('span',{className:'mono',style:{fontSize:'11px',fontWeight:'600',color:'#c8dae8'}},item.val.toFixed(3)));
        c.appendChild(row);
      });

      // Scores
      c.appendChild(el('h3',{className:'sec-title',style:{marginTop:'12px'}},'Component Scores'));
      [{label:'Jitter Score',score:r.jitterScore},{label:'Shimmer Score',score:r.shimmerScore},{label:'HNR Score',score:r.hnrScore},{label:'Breath Support',score:r.breathScore}].forEach(item=>{
        const row=el('div',{style:{marginBottom:'8px'}});
        const top=el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'2px'}});
        top.appendChild(el('span',{style:{fontSize:'11px',fontWeight:'500'}},item.label));
        top.appendChild(el('span',{className:'mono',style:{fontSize:'11px',color:item.score>70?'#00d4aa':item.score>50?'#ffa502':'#ff4757'}},item.score.toFixed(0)+'/100'));
        row.appendChild(top);
        const track=el('div',{style:{width:'100%',height:'4px',background:'#1a2d44',borderRadius:'2px',overflow:'hidden'}});
        track.appendChild(el('div',{style:{width:item.score+'%',height:'100%',borderRadius:'2px',background:item.score>70?'#00d4aa':item.score>50?'#ffa502':'#ff4757'}}));
        row.appendChild(track);c.appendChild(row);
      });
      wrap.appendChild(c);
    }

    if(state.activeTab==='mfcc'){
      const c=el('div',{className:'card'});c.appendChild(el('h3',{className:'sec-title'},'Mel-Frequency Cepstral Coefficients (MFCC-13)'));
      c.appendChild(el('div',{className:'research-basis',innerHTML:'<strong>Research basis:</strong> MFCCs are the standard feature set in voice-based respiratory screening. They capture spectral envelope characteristics that correlate with vocal tract and respiratory function.'}));
      const mfccs=r.mfccs||Array(13).fill(0);
      const maxAbsVal=Math.max(...mfccs.map(Math.abs),1);
      const mfccGrid=el('div',{style:{display:'grid',gridTemplateColumns:'repeat(13,1fr)',gap:'3px',alignItems:'flex-end',height:'120px',padding:'10px 0',marginBottom:'8px'}});
      mfccs.forEach((val,i)=>{
        const normH=Math.abs(val)/maxAbsVal*100;const isPos=val>=0;
        const col=isPos?'#00d4aa':'#0099dd';
        const barWrap=el('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',height:'100%',justifyContent:'flex-end'}});
        barWrap.appendChild(el('div',{className:'mono',style:{fontSize:'7px',color:'#5a7a9a',marginBottom:'2px'}},val.toFixed(1)));
        barWrap.appendChild(el('div',{style:{width:'100%',height:Math.max(4,normH)+'%',background:col,borderRadius:'2px 2px 0 0',opacity:'0.8',transition:'height 0.5s ease'}}));
        barWrap.appendChild(el('div',{className:'mono',style:{fontSize:'7px',color:'#3a5a7a',marginTop:'2px'}},'C'+i));
        mfccGrid.appendChild(barWrap);
      });
      c.appendChild(mfccGrid);

      // MFCC table
      const table=el('div',{style:{marginTop:'10px'}});
      mfccs.forEach((val,i)=>{
        const row=el('div',{style:{display:'flex',justifyContent:'space-between',padding:'3px 0',borderBottom:'1px solid #1a2d4420'}});
        row.appendChild(el('span',{className:'mono',style:{fontSize:'10px',color:'#5a7a9a'}},'MFCC-'+i));
        row.appendChild(el('span',{className:'mono',style:{fontSize:'10px',fontWeight:'600',color:'#c8dae8'}},val.toFixed(4)));
        table.appendChild(row);
      });
      c.appendChild(table);wrap.appendChild(c);
    }

    // References
    const refCard=el('div',{className:'card',style:{background:'#081420'}});
    refCard.appendChild(el('h3',{className:'sec-title'},'Research References'));
    refCard.appendChild(el('div',{className:'research-ref',innerHTML:[
      '• <strong>de Cheveigné & Kawahara (2002)</strong> — YIN pitch detection algorithm.',
      '• <strong>VoiceMed (2025)</strong> — 88% accuracy predicting FEV1/FVC from voice.',
      '• <strong>Frontiers Digital Health (2022)</strong> — ML models predict FEV1% from voice.',
      '• <strong>Teixeira et al. (2013)</strong> — HNR reflects respiratory-to-vocal conversion.',
      '• <strong>Boersma (1993)</strong> — Jitter/shimmer perturbation standards (Praat).',
      '• <strong>Davis & Mermelstein (1980)</strong> — MFCC as speech feature representation.',
      '• <strong>King et al. (2019)</strong> — ATS/ERS oscillometry technical standards.'
    ].map(s=>'<div style="margin-bottom:4px">'+s+'</div>').join('')}));
    wrap.appendChild(refCard);

    // Disclaimer
    wrap.appendChild(el('div',{className:'disclaimer-box',innerHTML:'<p style="font-size:9px;color:#c8a050;margin:0;line-height:1.6;">⚠️ <strong>Disclaimer:</strong> PulmoVox v3 provides research-grade acoustic analysis but lung function predictions remain heuristic estimates based on published correlations. These are <strong>NOT clinical diagnoses</strong>. External validation against actual PFT data is required before clinical use.</p>'}));
    // Action buttons row
    const actionRow=el('div',{style:{display:'flex',gap:'8px',marginBottom:'14px'}});
    actionRow.appendChild(el('button',{className:'btn-primary',style:{flex:'1'},onClick:reset},'🔄 New Assessment'));
    actionRow.appendChild(el('button',{style:{flex:'1',padding:'14px',background:'linear-gradient(135deg,#0099dd,#0066aa)',border:'none',borderRadius:'10px',color:'#fff',fontSize:'14px',fontWeight:'700',cursor:'pointer',fontFamily:'inherit'},onClick:exportCSV},'⬇️ Export All CSV ('+state.assessmentHistory.length+')'));
    wrap.appendChild(actionRow);
    // Info about accumulation
    wrap.appendChild(el('div',{style:{textAlign:'center',fontSize:'9px',color:'#4a6a85',marginBottom:'10px',lineHeight:'1.5'}},'All assessments accumulate automatically in browser storage. Export CSV at any time — it includes every assessment taken on this device. No need to export after each measurement.'));
    app.appendChild(wrap);
  }
}

render();
</script>
</body>
</html>
